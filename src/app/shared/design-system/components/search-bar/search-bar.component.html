<div class="flex items-center border pl-4 gap-2 border-gray-500/30 h-[46px] rounded-full overflow-hidden max-w-md w-full transition-colors"
     [class.opacity-50]="disabled()"
     [class.pointer-events-none]="disabled()"
     [class.border-indigo-400]="value()">

  <!-- Search icon -->
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 30 30"
       class="shrink-0 transition-colors"
       [class.fill-indigo-500]="value()"
       [class.fill-gray-400]="!value()">
    <path d="M13 3C7.489 3 3 7.489 3 13s4.489 10 10 10a9.95 9.95 0 0 0 6.322-2.264l5.971 5.971a1 1 0 1 0 1.414-1.414l-5.97-5.97A9.95 9.95 0 0 0 23 13c0-5.511-4.489-10-10-10m0 2c4.43 0 8 3.57 8 8s-3.57 8-8 8-8-3.57-8-8 3.57-8 8-8"/>
  </svg>

  <!-- Input -->
  <input type="text"
         [placeholder]="placeholder()"
         [value]="value()"
         (input)="onInput($any($event.target).value)"
         class="w-full h-full outline-none bg-transparent text-sm text-gray-700 placeholder-gray-400 pr-2" />

  <!-- Clear button -->
  @if (value()) {
    <button type="button"
            (click)="clear()"
            class="flex items-center justify-center w-8 h-8 mr-1 rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  }

</div>
